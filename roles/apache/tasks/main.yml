---
- name: Install Apache
  apt:
    name: apache2
    state: present
    update_cache: yes

- name: Enable Apache modules
  apache2_module:
    name: "{{ item }}"
    state: present
  loop:
    - rewrite
    - headers

- name: Deploy virtual host config
  template:
    src: virtualhost.conf.j2
    dest: /etc/apache2/sites-available/{{ app_name }}.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Apache

- name: Enable our site
  command: a2ensite {{ app_name }}.conf
  notify: Restart Apache

- name: Disable default site
  command: a2dissite 000-default.conf
  notify: Restart Apache

- name: Ensure Apache is started and enabled
  service:
    name: apache2
    state: started
    enabled: yes

- name: Create web root directory
  file:
    path: /var/www/{{ app_name }}
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Deploy sample index page
  copy:
    content: |
      <html>
        <body>
          <h1>🚀 {{ app_name }} is Live!</h1>
          <p>Deployed by Ansible on {{ ansible_date_time.date }}</p>
        </body>
      </html>
    dest: /var/www/{{ app_name }}/index.html
    owner: www-data
    group: www-data
