---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - unzip
      - git
      - ufw
    state: present

- name: Set timezone to Asia/Kolkata
  timezone:
    name: Asia/Kolkata

- name: Create deploy user
  user:
    name: deploy
    shell: /bin/bash
    create_home: yes
    state: present
